<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat-App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f7ff',
                            100: '#ebf0fe',
                            550: '#4f46e5', // Indigo Core Accent
                            600: '#4338ca',
                            700: '#3730a3',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom dynamic scrollbar styling for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 9999px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 min-h-screen flex flex-col font-sans antialiased transition-colors duration-200">

    <div class="flex flex-col h-screen overflow-hidden">
        
        <header class="h-16 border-b border-slate-200 dark:border-slate-800/80 px-6 flex justify-between items-center bg-white/80 dark:bg-[#1e293b]/80 backdrop-blur-md z-10 shadow-sm shrink-0">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-brand-550 rounded-xl text-white shadow-md shadow-indigo-500/20">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-md font-bold tracking-tight text-slate-900 dark:text-white flex items-center gap-2">
                        GitChat <span class="text-xs px-2 py-0.5 rounded-full font-medium bg-emerald-500/10 text-emerald-500 dark:bg-emerald-400/10 dark:text-emerald-400 border border-emerald-500/20">v2.1 API</span>
                    </h1>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <div id="statusBadge" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 border border-slate-200 dark:border-slate-700/60">
                    <span class="w-2 h-2 rounded-full bg-slate-400" id="statusDot"></span>
                    <span id="statusText">Offline Base</span>
                </div>

                <button id="themeToggle" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700/50 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 hover:scale-105 active:scale-95 transition-all">
                    <svg class="w-5 h-5 hidden dark:block text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.243 17.657l.707.707M6.343 6.343l.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <svg class="w-5 h-5 dark:hidden text-slate-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                </button>
            </div>
        </header>

        <main class="flex-1 flex overflow-hidden">
            
            <section id="sidebarPanel" class="w-80 border-r border-slate-200 dark:border-slate-800/80 bg-white dark:bg-[#1e293b]/40 p-5 flex flex-col justify-between overflow-y-auto shrink-0 hidden md:flex transition-all">
                <div class="space-y-5">
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        <h2 class="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500">Repository Settings</h2>
                    </div>

                    <div class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-[11px] font-medium text-slate-500 dark:text-slate-400 pl-1">GitHub Access Token</label>
                            <input type="password" id="githubToken" placeholder="ghp_••••••••••••••••" class="w-full p-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-[#0f172a] text-sm focus:outline-none focus:ring-2 focus:ring-brand-550 focus:border-transparent transition-all">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-medium text-slate-500 dark:text-slate-400 pl-1">Owner Username</label>
                            <input type="text" id="repoOwner" placeholder="octocat" class="w-full p-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-[#0f172a] text-sm focus:outline-none focus:ring-2 focus:ring-brand-550 focus:border-transparent transition-all">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-medium text-slate-500 dark:text-slate-400 pl-1">Target Repository</label>
                            <input type="text" id="repoName" placeholder="my-chat-data" class="w-full p-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-[#0f172a] text-sm focus:outline-none focus:ring-2 focus:ring-brand-550 focus:border-transparent transition-all">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-medium text-slate-500 dark:text-slate-400 pl-1">JSON Endpoint Path</label>
                            <input type="text" id="filePath" value="data.json" class="w-full p-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-[#0f172a] text-sm focus:outline-none focus:ring-2 focus:ring-brand-550 focus:border-transparent transition-all">
                        </div>
                        <div class="space-y-1 border-t border-slate-200 dark:border-slate-800/80 pt-3">
                            <label class="text-[11px] font-medium text-slate-500 dark:text-slate-400 pl-1">Your Identity</label>
                            <input type="text" id="username" placeholder="Anonymous Developer" class="w-full p-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-[#0f172a] text-sm font-semibold text-brand-550 dark:text-indigo-400 focus:outline-none focus:ring-2 focus:ring-brand-550 focus:border-transparent transition-all">
                        </div>
                    </div>
                </div>

                <button id="connectBtn" class="w-full bg-brand-550 hover:bg-brand-600 text-white font-semibold py-3 px-4 rounded-xl text-sm transition-all shadow-lg shadow-indigo-600/10 hover:shadow-indigo-600/20 active:scale-[0.99] flex items-center justify-center gap-2 mt-4">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" /></svg>
                    <span>Establish Link</span>
                </button>
            </section>

            <section class="flex-1 flex flex-col bg-slate-50 dark:bg-[#0f172a] overflow-hidden">
                
                <div class="p-4 border-b border-slate-200 dark:border-slate-800/60 bg-white dark:bg-[#1e293b]/30 flex gap-3 items-center shrink-0">
                    <button id="mobileConfigToggle" class="md:hidden p-2.5 rounded-xl border border-slate-200 dark:border-slate-800 text-slate-500 dark:text-slate-400 bg-white dark:bg-[#1e293b]">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>
                    </button>

                    <div class="relative flex-1 max-w-lg">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        </span>
                        <input type="text" id="searchBar" placeholder="Search logs by keyword or contributor identity..." class="w-full p-2.5 pl-10 rounded-xl bg-white dark:bg-[#1e293b]/70 border border-slate-200 dark:border-slate-800/80 text-sm focus:outline-none focus:ring-2 focus:ring-brand-550 transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600 shadow-sm" disabled>
                    </div>
                </div>

                <div id="chatMessages" class="flex-1 p-6 overflow-y-auto space-y-4 flex flex-col bg-gradient-to-b from-slate-50 to-slate-100 dark:from-[#0f172a] dark:to-[#090d16]">
                    <div class="text-center max-w-sm mx-auto my-auto space-y-3">
                        <div class="w-12 h-12 mx-auto rounded-full bg-slate-200 dark:bg-slate-800 text-slate-400 dark:text-slate-600 flex items-center justify-center">
                            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                        </div>
                        <h3 class="font-semibold text-slate-700 dark:text-slate-300 text-sm">Connection Required</h3>
                        <p class="text-xs text-slate-400 dark:text-slate-500 leading-relaxed">Provide your authenticated GitHub token configuration variables in the panel matrix to begin streaming data packets.</p>
                    </div>
                </div>

                <div class="border-t border-slate-200 dark:border-slate-800/80 p-4 bg-white dark:bg-[#1e293b]/30 shrink-0">
                    <form id="chatForm" class="max-w-4xl mx-auto flex gap-3" style="display: none;">
                        <input type="text" id="messageInput" placeholder="Type a secure message, press enter to broadcast..." autocomplete="off" class="flex-1 p-3 rounded-xl bg-white dark:bg-[#0f172a] border border-slate-200 dark:border-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-brand-550 shadow-inner placeholder:text-slate-400 dark:placeholder:text-slate-600">
                        <button type="submit" id="sendBtn" class="bg-brand-550 hover:bg-brand-600 text-white px-5 rounded-xl text-sm font-semibold transition-all shadow-md shadow-indigo-600/10 flex items-center gap-2 hover:scale-[1.02] active:scale-[0.98]">
                            <span>Broadcast</span>
                            <svg class="w-4 h-4 transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                        </button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script>
        let messages = [];
        let fileSha = null;
        let updateInterval = null;
        let timestampInterval = null;

        // Dark/Light Theme Control Engine
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        // Mobile Configurations Expand Framework
        document.getElementById('mobileConfigToggle').addEventListener('click', () => {
            const sidebar = document.getElementById('sidebarPanel');
            sidebar.classList.toggle('hidden');
            sidebar.classList.toggle('absolute');
            sidebar.classList.toggle('z-40');
            sidebar.classList.toggle('inset-y-16');
            sidebar.classList.toggle('left-0');
            sidebar.classList.toggle('shadow-2xl');
        });

        // Smart Adaptive Dynamic Timestamp Parser
        function getRelativeTimeString(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const elapsed = now - date;

            const msPerMinute = 60 * 1000;
            const msPerHour = msPerMinute * 60;
            const msPerDay = msPerHour * 24;

            if (elapsed < msPerMinute) {
                return 'just now';
            } else if (elapsed < msPerHour) {
                const mins = Math.round(elapsed / msPerMinute);
                return `${mins}m ago`;
            } else if (elapsed < msPerDay) {
                const hours = Math.round(elapsed / msPerHour);
                return `${hours}h ago`;
            } else {
                return date.toLocaleDateString(undefined, {month: 'short', day: 'numeric'});
            }
        }

        // GitHub API Downstream Request 
        async function fetchMessages() {
            const token = document.getElementById('githubToken').value;
            const owner = document.getElementById('repoOwner').value;
            const repo = document.getElementById('repoName').value;
            const path = document.getElementById('filePath').value;

            if (!token || !owner || !repo || !path) return;

            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

            try {
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!response.ok) throw new Error('Unresolved storage mapping');

                const data = await response.json();
                fileSha = data.sha; 
                
                const decodedContent = decodeURIComponent(atob(data.content).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));

                messages = JSON.parse(decodedContent || '[]');
                renderMessages();
                updateStatusBadge(true);
            } catch (error) {
                console.error("Error downstream pipe broken:", error);
                updateStatusBadge(false);
            }
        }

        // GitHub API Upstream Write Transaction
        async function sendMessage(text) {
            const token = document.getElementById('githubToken').value;
            const owner = document.getElementById('repoOwner').value;
            const repo = document.getElementById('repoName').value;
            const path = document.getElementById('filePath').value;
            const user = document.getElementById('username').value || 'Anonymous Contributor';

            if (!text.trim()) return;

            const newMessage = {
                id: Date.now().toString(),
                user: user,
                text: text.trim(),
                timestamp: new Date().toISOString()
            };

            // Optimistic rendering matrix (Push immediately for responsive UI feeling)
            messages.unshift(newMessage);
            renderMessages();

            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            const updatedContentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(messages, null, 2))));

            const payload = {
                message: `🤖 Broadcast commit from [${user}]`,
                content: updatedContentBase64,
                sha: fileSha
            };

            try {
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('Upstream rejected push block');

                const resData = await response.json();
                fileSha = resData.content.sha; 
            } catch (error) {
                console.error("Upstream synchronization conflict. Purging cache.", error);
                fetchMessages();
            }
        }

        // Component Renderer Loop (Case-Insensitive matching + Newest First Sorting)
        function renderMessages() {
            const container = document.getElementById('chatMessages');
            const searchQuery = document.getElementById('searchBar').value.toLowerCase();
            const currentUser = document.getElementById('username').value || 'Anonymous Contributor';
            
            const filteredMessages = messages.filter(msg => {
                return msg.user.toLowerCase().includes(searchQuery) || 
                       msg.text.toLowerCase().includes(searchQuery);
            });

            // Structural Sort Rule: Newest entry always listed first
            filteredMessages.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            if (filteredMessages.length === 0) {
                container.innerHTML = `
                    <div class="text-center max-w-xs mx-auto my-auto space-y-2">
                        <p class="text-sm font-medium text-slate-400 dark:text-slate-600">No matching telemetry packets found.</p>
                    </div>`;
                return;
            }

            container.innerHTML = filteredMessages.map(msg => {
                const isMe = msg.user === currentUser;
                return `
                <div class="flex flex-col gap-1 max-w-[80%] ${isMe ? 'self-end items-end' : 'self-start items-start'} group transition-all duration-200">
                    <div class="flex items-center gap-2 px-1">
                        <span class="text-xs font-bold tracking-wide ${isMe ? 'text-indigo-500 dark:text-indigo-400' : 'text-slate-600 dark:text-slate-400'}">${escapeHTML(msg.user)}</span>
                        <span class="text-[10px] font-medium text-slate-400 dark:text-slate-500 data-timestamp" data-time="${msg.timestamp}">
                            ${getRelativeTimeString(msg.timestamp)}
                        </span>
                    </div>
                    <div class="p-3.5 rounded-2xl text-sm border shadow-sm transition-all duration-150 leading-relaxed ${
                        isMe 
                        ? 'bg-brand-550 text-white border-transparent rounded-tr-none' 
                        : 'bg-white dark:bg-[#1e293b] text-slate-800 dark:text-slate-200 border-slate-200 dark:border-slate-800/80 rounded-tl-none'
                    }">
                        <p class="whitespace-pre-wrap break-words">${escapeHTML(msg.text)}</p>
                    </div>
                </div>
            `}).join('');
        }

        // Adaptive Layout Updates (Mutates strings, prevents complete DOM layout re-renders)
        function updateTimestamps() {
            document.querySelectorAll('.data-timestamp').forEach(el => {
                const timeStr = el.getAttribute('data-time');
                el.textContent = getRelativeTimeString(timeStr);
            });
        }

        // Global Application State Indicators
        function updateStatusBadge(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            if (connected) {
                dot.className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
                text.textContent = "Data Mesh Active";
            } else {
                dot.className = "w-2 h-2 rounded-full bg-rose-500";
                text.textContent = "Pipeline Error";
            }
        }

        // XSS Injection Sanitization Shield
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // Init Event Hook Architecture
        document.getElementById('connectBtn').addEventListener('click', async () => {
            const btn = document.getElementById('connectBtn');
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Syncing Token...`;

            await fetchMessages();

            if (fileSha) {
                document.getElementById('searchBar').removeAttribute('disabled');
                document.getElementById('chatForm').style.display = 'flex';
                
                // Keep synchronization loop pulsing in background every 8 seconds
                clearInterval(updateInterval);
                updateInterval = setInterval(fetchMessages, 8000);

                // Update relative strings dynamically every 20 seconds
                clearInterval(timestampInterval);
                timestampInterval = setInterval(updateTimestamps, 20000);
            } else {
                updateStatusBadge(false);
            }
            btn.disabled = false;
            btn.innerHTML = `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg> <span>Mesh Verified</span>`;
        });

        document.getElementById('searchBar').addEventListener('input', renderMessages);

        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('messageInput');
            const text = input.value;
            if (!text.trim()) return;

            input.value = '';
            await sendMessage(text);
        });
    </script>
</body>
</html>
